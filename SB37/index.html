<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SB37 COA | California Legal Advertising Assessment</title>
    <meta name="description" content="Run a free SB37 compliance opportunity assessment for California law firm advertising, AI content, intake scripts, lead vendors, and disclosures.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="top-scan-shell">
        <a class="brand" href="index.html" aria-label="SB37 COA home">
          <img src="assets/sb37-coa-logo.png" alt="SB37 COA logo">
        </a>
        <div class="small-links" aria-label="Site links">
          <a href="#assessment">Report</a>
          <a href="about.html">About</a>
          <a href="terms.html">Terms</a>
        </div>
        <form class="top-scan-form" id="assessmentForm">
          <label class="sr-only" for="website">Law firm website</label>
          <input id="website" name="website" type="text" inputmode="url" autocapitalize="none" autocomplete="url" spellcheck="false" placeholder="examplelaw.com" required>
          <button class="button primary" type="submit">Run test</button>
        </form>
      </div>
    </header>

    <main class="scan-app">
      <section class="assessment-shell compact-report" id="assessment">
        <div class="assessment-output">
          <article class="report-card" id="reportCard" aria-live="polite">
            <div class="report-empty">
              <span class="report-badge">Ready</span>
              <h3>Enter a law firm website to run the SB37 report.</h3>
              <p>The score and category breakdown will appear here.</p>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
